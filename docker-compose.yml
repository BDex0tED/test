version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    ports:
      - "5439:5432"
    environment:
      - POSTGRES_DB=ayilbank_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ayilbank_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ayilbank_app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ayilbank_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres

volumes:
  postgres_data: